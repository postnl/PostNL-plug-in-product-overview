<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Mijn GitHub Pages Tabel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    tr:hover {
      background-color: #f1f1f1;
    }
  </style>
</head>
<body>

<h1>Mijn tabel</h1>

<table>
  <tr>
    <th>Naam</th>
    <th>Leeftijd</th>
    <th>Stad</th>
  </tr>
  <tr>
    <td>Jan</td>
    <td>28</td>
    <td>Amsterdam</td>
  </tr>
  <tr>
    <td>Lisa</td>
    <td>34</td>
    <td>Rotterdam</td>
  </tr>
  <tr>
    <td>Mohammed</td>
    <td>22</td>
    <td>Utrecht</td>
  </tr>
</table>

</body>
</html>
